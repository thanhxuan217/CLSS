# Config cho training Sino-Nom Punctuation Restoration với MinHash RAG context
# Task: dự đoán dấu câu (，。：、；？！) sau mỗi ký tự
# Dựa trên wnut17_doc_cl_kl.yaml — chỉnh cho Sino-Nom + MinHash retrieved dataset

# ─── Model Settings ───────────────────────────────────────────────────────────
model:
  FastSequenceTagger:
    # CRF decoder (khuyến nghị cho sequence labeling)
    use_crf: true
    use_rnn: false
    use_cnn: false

    # Multi-view training (cooperative learning)
    multi_view_training: true    # Bật cooperative learning
    distill_posterior: true      # KL divergence giữa 2 views
    remove_x: true               # Bỏ token S-X khỏi output final view
    sentence_loss: true          # Loss ở cấp sentence

    # Architecture
    hidden_size: 256
    dropout: 0.0
    locked_dropout: 0.0
    word_dropout: 0.1

    # Distillation temperature (paper dùng 0.3)
    temperature: 0.3

    # Không dùng CRF attention / distill CRF cho config đơn giản
    crf_attention: false
    distill_crf: false

# ─── Embeddings ───────────────────────────────────────────────────────────────
embeddings:
  TransformerWordEmbeddings-0:
    # Thay bằng model Sino-Nom riêng nếu có
    # Ví dụ: bert-base-chinese hoặc hfl/chinese-roberta-wwm-ext
    model: SIKU-BERT/sikubert
    fine_tune: true
    layers: '-1'
    pooling_operation: first

# ─── Dataset ──────────────────────────────────────────────────────────────────
# QUAN TRỌNG: targets phải khớp với key dataset bên dưới (punct)
targets: punct

punct:
  # Corpus source (không có retrieved context) — dùng làm "gốc" view
  ColumnCorpus-SinoNomPunct:
    column_format:
      0: text
      1: punct
    # Cập nhật đường dẫn thực tế đến dataset punct Sino-Nom
    # Tạo bằng: python tools/build_punct_conll.py --raw_data_dir data/raw --output_dir data/sino_nom_punct
    data_folder: data/sino_nom_punct
    # KHÔNG dùng tag_to_bioes: dấu câu là flat labels, không cần BIOES

  # Corpus doc (có retrieved context qua MinHash RAG) — dùng làm "doc" view
  ColumnCorpus-SinoNomPunctDoc:
    column_format:
      0: text
      1: punct
    # Tạo bằng: python tools/generate_doc_dataset.py --input_dir data/sino_nom_punct --output_dir data/sino_nom_punct_doc ...
    data_folder: data/sino_nom_punct_doc

  # Kết hợp 2 corpus cho multi-view training
  Corpus: ColumnCorpus-SinoNomPunct:ColumnCorpus-SinoNomPunctDoc

  # Tag dictionary — tự tạo lần đầu nếu chưa có
  tag_dictionary: resources/taggers/sino_nom_punct_tags.pkl

# ─── Training ─────────────────────────────────────────────────────────────────
train:
  fine_tune_mode: true
  embeddings_storage_mode: none    # Tiết kiệm VRAM

  # Optimizer
  learning_rate: 5.0e-5            # LR cho bert-base-chinese
  lr_rate: 10000
  use_warmup: false

  # Batch & Accumulation
  mini_batch_size: 4               # Tăng nếu VRAM đủ
  gradient_accumulation_steps: 4   # Effective batch = 16

  # Epochs — bắt đầu với 10, tăng nếu cần
  max_epochs: 10

  # Eval
  monitor_test: true
  train_with_dev: false
  true_reshuffle: false

  # Checkpointing
  save_final_model: true

# ─── Trainer ──────────────────────────────────────────────────────────────────
trainer: ModelFinetuner
ModelFinetuner:
  distill_mode: false
  sentence_level_batch: true

# ─── Interpolation (cooperative learning weight) ──────────────────────────────
# 0.5 = weighted average đều giữa 2 views
interpolation: 0.5

# ─── Output ───────────────────────────────────────────────────────────────────
target_dir: resources/taggers/
model_name: sikubert_10epoch_4batch_4accumulate_5e-5lr_sino_nom_punct_crf_multiview_posterior_minhash_rag

# ─── MFVI (Message Passing Variational Inference — tắt mặc định) ──────────────
MFVI:
  use_second_order: false
  use_third_order: false
  use_hexalinear: false
  use_quadrilinear: false
  iterations: 3
  normalize_weight: true
  tag_dim: 150
  quad_rank: 150
  quad_std: 1
  hexa_rank: 150
  hexa_std: 1
  window_size: 1

# ─── Misc ─────────────────────────────────────────────────────────────────────
teacher_annealing: false
is_teacher_list: true
anneal_factor: 2
